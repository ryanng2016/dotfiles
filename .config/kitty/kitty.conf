# ==========================================================
# kitty.conf — Pastel VN (soft navy + sakura pink + icy blue)
# For Sway/Wayland + ThinkPad-friendly readability
# ==========================================================

# --------------------------
# FONT
# --------------------------
font_family      Sarasa Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

# Keep text crisp but not harsh
adjust_line_height  0
adjust_column_width 0

# --------------------------
# WINDOW / LAYOUT
# --------------------------
window_padding_width 14
window_border_width  1
window_margin_width  0

# Soft translucent glass feel
background_opacity 0.95

# Make sure kitty behaves nicely under Wayland/Sway
wayland_titlebar_color background
remember_window_size yes
initial_window_width  1200
initial_window_height 720

# --------------------------
# COLORS (your palette)
# --------------------------
background #1b2233
foreground #e6f2ff

# Cursor
cursor              #8ec5ff
cursor_text_color   #1b2233
cursor_shape        beam
cursor_blink_interval 0.6

# Selection
selection_background #2a3550
selection_foreground #ffffff

# URL underline / visual accents
url_color #82bbff

# Terminal 16-color palette
color0  #20283c
color1  #ff9bdc
color2  #8ec5ff
color3  #b7dcff
color4  #5fa8ff
color5  #c792ea
color6  #89ddff
color7  #e6f2ff

color8  #3a4666
color9  #ffb7e9
color10 #a6d6ff
color11 #d0eaff
color12 #82bbff
color13 #ddb7ff
color14 #b6f0ff
color15 #ffffff

# --------------------------
# TAB BAR (subtle, minimal)
# --------------------------
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_foreground   #1b2233
active_tab_background   #8ec5ff
inactive_tab_foreground #e6f2ff
inactive_tab_background #20283c

# --------------------------
# SCROLLBACK
# --------------------------
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# --------------------------
# BELL / NOTIFICATIONS
# --------------------------
enable_audio_bell no
visual_bell_duration 0.0

# --------------------------
# CLIPBOARD (Wayland-friendly)
# --------------------------
copy_on_select no
clipboard_control write-clipboard write-primary read-clipboard read-primary

# --------------------------
# KEYBINDS (small QoL)
# --------------------------
# Bigger font / smaller font quickly
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# New tab / close tab (optional; feels "VN terminal" comfy)
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab

# If you ever get stuck with weird input, this can help:
# map ctrl+shift+r clear_terminal reset active

# --------------------------
# SAFETY: DO NOT OVERRIDE SHELL
# --------------------------
# Leave shell unset so kitty uses your login shell correctly.
# (This avoids the "new kitty window can't type" issue.)
# shell /bin/bash